<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dig to China</title>
    <embed id="game" src="digtochina.swf" height="500px" width="500px%" allowfullscreen="true" />
    <button onclick="toggleFullscreen()">Fullscreen</button>

</head>
<body>
    
    <script>
        function toggleFullscreen() {
            const embed = document.getElementById("game");

            if (embed.requestFullscreen) {
                embed.requestFullscreen();
            } else if (embed.webkitRequestFullscreen) { 
                embed.webkitRequestFullscreen();
            } else if (embed.msRequestFullscreen) { 
                embed.msRequestFullscreen();
            }
        }
    </script>
    
</body>
</html>
